name: PR Checks

on:
  pull_request:

jobs:
  # ============================================================================
  # Backend: Unit + Integration Tests
  # ============================================================================
  backend-tests:
    name: Backend Tests (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test tests/HouseFlow.UnitTests/HouseFlow.UnitTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=unit-tests.trx"

      - name: Run Integration Tests
        id: integration-tests
        continue-on-error: true
        run: dotnet test tests/HouseFlow.IntegrationTests/HouseFlow.IntegrationTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=integration-tests.trx" --logger "console;verbosity=detailed" 2>&1 | tee /tmp/integration-test-output.txt

      - name: Debug Integration Test Failures
        if: steps.integration-tests.outcome == 'failure'
        run: |
          echo "## Integration Test Failures" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -A 5 "Failed\|Error\|Exception\|FAIL" /tmp/integration-test-output.txt | head -100 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Full Output (last 50 lines)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -50 /tmp/integration-test-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            tests/HouseFlow.UnitTests/TestResults/
            tests/HouseFlow.IntegrationTests/TestResults/
          retention-days: 7

  # ============================================================================
  # Frontend: Lint + Build
  # ============================================================================
  frontend-checks:
    name: Frontend Checks (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HouseFlow.Frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/HouseFlow.Frontend
        run: npm ci

      - name: Lint
        working-directory: src/HouseFlow.Frontend
        run: npm run lint

      - name: Unit Tests
        working-directory: src/HouseFlow.Frontend
        run: npm run test:unit

      - name: Build
        working-directory: src/HouseFlow.Frontend
        run: npm run build

  # ============================================================================
  # E2E Tests (requires full stack, without Aspire orchestrator)
  # ============================================================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-tests, frontend-checks]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: houseflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ConnectionStrings__houseflow: "Host=localhost;Port=5432;Database=houseflow;Username=postgres;Password=postgres"
      JWT__KEY: "ThisIsAVeryLongSecretKeyForCITestingPurposesOnly1234567890"
      Jwt__Issuer: "HouseFlow"
      Jwt__Audience: "HouseFlow"
      ASPNETCORE_ENVIRONMENT: "CI"
      ASPNETCORE_URLS: "http://localhost:5203"
      NEXT_PUBLIC_API_URL: "http://localhost:5203"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HouseFlow.Frontend/package-lock.json

      - name: Install .NET dependencies
        run: dotnet restore

      - name: Install frontend dependencies
        working-directory: src/HouseFlow.Frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: src/HouseFlow.Frontend
        run: npx playwright install --with-deps chromium

      - name: Build .NET projects
        run: dotnet build --no-restore

      - name: Verify PostgreSQL is ready
        run: |
          pg_isready -h localhost -p 5432 -U postgres
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d houseflow -c "SELECT 1;"

      - name: Apply database migrations
        run: |
          dotnet tool install --global dotnet-ef
          export PATH="$HOME/.dotnet/tools:$PATH"
          DOTNET_LAUNCH_PROFILE="" dotnet ef database update --project src/HouseFlow.Infrastructure --startup-project src/HouseFlow.API

      - name: Start API and verify it runs
        run: |
          dotnet run --project src/HouseFlow.API --no-launch-profile > /tmp/api.log 2>&1 &
          API_PID=$!
          echo $API_PID > api.pid
          echo "API started with PID $API_PID, waiting 10s..."
          sleep 10
          if ! ps -p $API_PID > /dev/null 2>&1; then
            echo "::error::API process crashed at startup"
            echo "::error::$(tail -20 /tmp/api.log | tr '\n' ' ')"
            cat /tmp/api.log
            exit 1
          fi
          echo "API process is running (PID $API_PID)"

      - name: Start Frontend (background)
        working-directory: src/HouseFlow.Frontend
        run: |
          npm run dev > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid

      - name: Wait for services to be ready
        run: |
          echo "Waiting for API health check (localhost:5203/health)..."
          for i in $(seq 1 30); do
            if curl -sfL http://localhost:5203/health > /dev/null 2>&1; then
              echo "API is healthy after ${i} attempts."
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::API failed to start within 60s"
              echo "## E2E Debug - API failed to start" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### API Logs" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat /tmp/api.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No API log" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### Listening Ports" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              ss -tlnp >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for Frontend (localhost:3000)..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready after ${i} attempts."
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::Frontend failed to start within 60s"
              echo "=== Frontend logs ==="
              cat /tmp/frontend.log 2>/dev/null || echo "No frontend log"
              exit 1
            fi
            sleep 2
          done

      - name: Run Playwright tests
        working-directory: src/HouseFlow.Frontend
        run: npx playwright test --project=chromium

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: src/HouseFlow.Frontend/playwright-report/
          retention-days: 30

      - name: Upload service logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: service-logs
          path: |
            /tmp/api.log
            /tmp/frontend.log
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          [ -f api.pid ] && kill $(cat api.pid) || true
          [ -f /tmp/frontend.pid ] && kill $(cat /tmp/frontend.pid) || true

name: PR Checks

on:
  pull_request:

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  # ============================================================================
  # Backend: Build + Cache (shared by unit and integration jobs)
  # ============================================================================
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-build
          path: |
            src/*/bin/Release/
            src/*/obj/
            tests/*/bin/Release/
            tests/*/obj/
          retention-days: 1

  # ============================================================================
  # Backend: Unit Tests (parallel with integration)
  # ============================================================================
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [backend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: backend-build

      - name: Run Unit Tests
        run: dotnet test tests/HouseFlow.UnitTests/HouseFlow.UnitTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=unit-tests.trx" --logger "junit;LogFileName=unit-tests.xml" --results-directory tests/HouseFlow.UnitTests/TestResults

      - name: Unit Test Report
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
        if: always() && (success() || failure())
        with:
          name: Backend Unit Test Results
          path: 'tests/HouseFlow.UnitTests/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: 'false'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: backend-unit-test-results
          path: tests/HouseFlow.UnitTests/TestResults/
          retention-days: 7

  # ============================================================================
  # Backend: Integration Tests (parallel with unit)
  # ============================================================================
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: backend-build

      - name: Verify Docker is ready
        run: |
          docker info
          docker pull postgres:17.6

      - name: Run Integration Tests
        id: integration-tests
        continue-on-error: true
        env:
          ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"
        run: |
          set -o pipefail
          dotnet test tests/HouseFlow.IntegrationTests/HouseFlow.IntegrationTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=integration-tests.trx" --logger "junit;LogFileName=integration-tests.xml" --logger "console;verbosity=detailed" --results-directory tests/HouseFlow.IntegrationTests/TestResults 2>&1 | tee /tmp/integration-test-output.txt

      - name: Debug Integration Test Failures
        if: steps.integration-tests.outcome == 'failure'
        run: |
          echo "## Integration Test Failures"
          echo "=== ERRORS ==="
          grep -A 5 "Error\|Exception\|FAIL\|fail:" /tmp/integration-test-output.txt | head -100 || true
          echo ""
          echo "=== LAST 50 LINES ==="
          tail -50 /tmp/integration-test-output.txt || true
          exit 1

      - name: Integration Test Report
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
        if: always() && (success() || failure())
        with:
          name: Backend Integration Test Results
          path: 'tests/HouseFlow.IntegrationTests/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: 'false'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: backend-integration-test-results
          path: tests/HouseFlow.IntegrationTests/TestResults/
          retention-days: 7

  # ============================================================================
  # Frontend: Lint + Build
  # ============================================================================
  frontend-checks:
    name: Frontend Checks (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HouseFlow.Frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/HouseFlow.Frontend
        run: npm ci

      - name: Lint
        working-directory: src/HouseFlow.Frontend
        run: npm run lint

      - name: Run Unit Tests
        working-directory: src/HouseFlow.Frontend
        run: npm run test:unit -- --reporter=default --reporter=junit --outputFile=test-results/junit.xml
        continue-on-error: true

      - name: Frontend Unit Test Report
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
        if: always() && (success() || failure())
        with:
          name: Frontend Unit Test Results
          path: src/HouseFlow.Frontend/test-results/junit.xml
          reporter: jest-junit
          fail-on-error: 'false'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        working-directory: src/HouseFlow.Frontend
        run: npm run build

  # ============================================================================
  # E2E Tests (full stack via Aspire AppHost)
  # ============================================================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [backend-unit-tests, backend-integration-tests, frontend-checks]
    if: ${{ !cancelled() }}

    env:
      NEXT_PUBLIC_API_URL: "http://localhost:5203"
      ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HouseFlow.Frontend/package-lock.json

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install .NET dependencies
        run: dotnet restore

      - name: Install frontend dependencies
        working-directory: src/HouseFlow.Frontend
        run: npm ci

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('src/HouseFlow.Frontend/package-lock.json') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: src/HouseFlow.Frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: src/HouseFlow.Frontend
        run: npx playwright install-deps chromium

      - name: Pre-pull PostgreSQL & build .NET in parallel
        run: |
          docker pull postgres:17 &
          DOCKER_PID=$!
          dotnet build --no-restore
          wait $DOCKER_PID

      - name: Start Aspire AppHost
        run: |
          dotnet run --project src/HouseFlow.AppHost --no-build > /tmp/apphost.log 2>&1 &
          echo $! > /tmp/apphost.pid
          echo "AppHost started with PID $(cat /tmp/apphost.pid)"

      - name: Wait for services to be ready
        run: |
          echo "Waiting for API health check (localhost:5203/alive)..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:5203/alive > /dev/null 2>&1; then
              echo "API is healthy after ${i} attempts (~${i}s)."
              break
            fi
            if [ $i -eq 120 ]; then
              echo "::error::API failed to start within 120s"
              echo "## E2E Debug - API failed to start" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### AppHost Logs (last 150 lines)" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              tail -150 /tmp/apphost.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No AppHost log" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
            sleep 1
          done
          echo "Waiting for Frontend (localhost:3000)..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready after ${i} attempts (~${i}s)."
              break
            fi
            if [ $i -eq 120 ]; then
              echo "::error::Frontend failed to start within 120s"
              echo "### AppHost Logs (last 100 lines)" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              tail -100 /tmp/apphost.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No AppHost log" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
            sleep 1
          done

      - name: Verify services and warm up frontend
        run: |
          echo "=== Verify AppHost process ==="
          if [ -f /tmp/apphost.pid ] && kill -0 $(cat /tmp/apphost.pid) 2>/dev/null; then
            echo "AppHost PID $(cat /tmp/apphost.pid) is running"
          else
            echo "::error::AppHost process is NOT running!"
            tail -100 /tmp/apphost.log 2>/dev/null || echo "No log available"
            exit 1
          fi

          echo "=== Warm up frontend pages (Next.js on-demand compilation) ==="
          for path in /fr /fr/register /fr/login; do
            echo "  Warming up $path ..."
            curl -sf -o /dev/null "http://localhost:3000${path}" || echo "  Warning: $path returned non-success"
          done
          echo "Frontend warm-up complete."

      - name: Run Playwright tests
        working-directory: src/HouseFlow.Frontend
        run: PLAYWRIGHT_JUNIT_OUTPUT_NAME=test-results/e2e-junit.xml npx playwright test --project=chromium --reporter=list,junit

      - name: E2E Test Report
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
        if: always() && (success() || failure())
        with:
          name: E2E Test Results (Playwright)
          path: src/HouseFlow.Frontend/test-results/e2e-junit.xml
          reporter: java-junit
          fail-on-error: 'false'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: playwright-report
          path: src/HouseFlow.Frontend/playwright-report/
          retention-days: 30

      - name: Upload service logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: service-logs
          path: /tmp/apphost.log
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          [ -f /tmp/apphost.pid ] && kill $(cat /tmp/apphost.pid) || true

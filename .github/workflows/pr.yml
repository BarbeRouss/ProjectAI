name: PR Checks

on:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ============================================================================
  # Backend: Unit + Integration Tests
  # ============================================================================
  backend-tests:
    name: Backend Tests (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test tests/HouseFlow.UnitTests/HouseFlow.UnitTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=unit-tests.trx" --logger "junit;LogFileName=unit-tests.xml" --results-directory tests/HouseFlow.UnitTests/TestResults

      - name: Verify Docker is ready
        run: |
          docker info
          docker pull postgres:17.6

      - name: Run Integration Tests
        id: integration-tests
        continue-on-error: true
        env:
          ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"
        run: dotnet test tests/HouseFlow.IntegrationTests/HouseFlow.IntegrationTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=integration-tests.trx" --logger "junit;LogFileName=integration-tests.xml" --logger "console;verbosity=detailed" --results-directory tests/HouseFlow.IntegrationTests/TestResults 2>&1 | tee /tmp/integration-test-output.txt

      - name: Debug Integration Test Failures
        if: steps.integration-tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build diagnostic comment
          BODY="## Integration Test Failure Diagnostics"$'\n\n'
          BODY+="### First 60 lines"$'\n'"\`\`\`"$'\n'
          BODY+="$(head -60 /tmp/integration-test-output.txt 2>/dev/null || echo 'No output')"
          BODY+=$'\n'"\`\`\`"$'\n\n'
          BODY+="### Errors"$'\n'"\`\`\`"$'\n'
          BODY+="$(grep -A 3 'Error\|Exception\|FAIL\|fail:' /tmp/integration-test-output.txt 2>/dev/null | head -80 || echo 'No errors found')"
          BODY+=$'\n'"\`\`\`"$'\n\n'
          BODY+="### Last 30 lines"$'\n'"\`\`\`"$'\n'
          BODY+="$(tail -30 /tmp/integration-test-output.txt 2>/dev/null || echo 'No output')"
          BODY+=$'\n'"\`\`\`"$'\n\n'
          BODY+="### Docker"$'\n'"\`\`\`"$'\n'
          BODY+="$(docker ps -a 2>&1 || echo 'Docker unavailable')"
          BODY+=$'\n'"\`\`\`"

          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
          exit 1

      - name: Backend Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Backend Test Results
          path: 'tests/**/TestResults/*.trx'
          reporter: dotnet-trx

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            tests/HouseFlow.UnitTests/TestResults/
            tests/HouseFlow.IntegrationTests/TestResults/
          retention-days: 7

  # ============================================================================
  # Frontend: Lint + Build
  # ============================================================================
  frontend-checks:
    name: Frontend Checks (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HouseFlow.Frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/HouseFlow.Frontend
        run: npm ci

      - name: Lint
        working-directory: src/HouseFlow.Frontend
        run: npm run lint

      - name: Run Unit Tests
        working-directory: src/HouseFlow.Frontend
        run: npm run test:unit -- --reporter=default --reporter=junit --outputFile=test-results/junit.xml
        continue-on-error: true

      - name: Frontend Unit Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Frontend Unit Test Results
          path: src/HouseFlow.Frontend/test-results/junit.xml
          reporter: jest-junit

      - name: Build
        working-directory: src/HouseFlow.Frontend
        run: npm run build

  # ============================================================================
  # E2E Tests (full stack via Aspire AppHost)
  # ============================================================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-tests, frontend-checks]

    env:
      NEXT_PUBLIC_API_URL: "http://localhost:5203"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HouseFlow.Frontend/package-lock.json

      - name: Install .NET dependencies
        run: dotnet restore

      - name: Install frontend dependencies
        working-directory: src/HouseFlow.Frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: src/HouseFlow.Frontend
        run: npx playwright install --with-deps chromium

      - name: Build .NET projects
        run: dotnet build --no-restore

      - name: Start Aspire AppHost
        run: |
          dotnet run --project src/HouseFlow.AppHost --no-build > /tmp/apphost.log 2>&1 &
          echo $! > /tmp/apphost.pid
          echo "AppHost started with PID $(cat /tmp/apphost.pid)"
        env:
          ASPIRE_ALLOW_UNSECURED_TRANSPORT: "true"

      - name: Wait for services to be ready
        run: |
          echo "Waiting for API health check (localhost:5203/alive)..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5203/alive > /dev/null 2>&1; then
              echo "API is healthy after ${i} attempts."
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::API failed to start within 60s"
              echo "## E2E Debug - API failed to start" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "### AppHost Logs" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              tail -100 /tmp/apphost.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No AppHost log" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for Frontend (localhost:3000)..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready after ${i} attempts."
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::Frontend failed to start within 60s"
              tail -50 /tmp/apphost.log 2>/dev/null || echo "No AppHost log"
              exit 1
            fi
            sleep 2
          done

      - name: Run Playwright tests
        working-directory: src/HouseFlow.Frontend
        run: PLAYWRIGHT_JUNIT_OUTPUT_NAME=test-results/e2e-junit.xml npx playwright test --project=chromium --reporter=list,junit

      - name: E2E Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: E2E Test Results (Playwright)
          path: src/HouseFlow.Frontend/test-results/e2e-junit.xml
          reporter: java-junit

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: src/HouseFlow.Frontend/playwright-report/
          retention-days: 30

      - name: Upload service logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: service-logs
          path: /tmp/apphost.log
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          [ -f /tmp/apphost.pid ] && kill $(cat /tmp/apphost.pid) || true

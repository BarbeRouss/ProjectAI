name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================================
  # Backend: Unit + Integration Tests
  # ============================================================================
  backend-tests:
    name: Backend Tests (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test tests/HouseFlow.UnitTests/HouseFlow.UnitTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=unit-tests.trx"

      - name: Run Integration Tests
        run: dotnet test tests/HouseFlow.IntegrationTests/HouseFlow.IntegrationTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=integration-tests.trx"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            tests/HouseFlow.UnitTests/TestResults/
            tests/HouseFlow.IntegrationTests/TestResults/
          retention-days: 7

  # ============================================================================
  # Frontend: Lint + Build
  # ============================================================================
  frontend-checks:
    name: Frontend Checks (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HouseFlow.Frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/HouseFlow.Frontend
        run: npm ci

      - name: Lint
        working-directory: src/HouseFlow.Frontend
        run: npm run lint

      - name: Build
        working-directory: src/HouseFlow.Frontend
        run: npm run build

  # ============================================================================
  # E2E Tests (requires full stack)
  # ============================================================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-tests, frontend-checks]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HouseFlow.Frontend/package-lock.json

      - name: Install .NET dependencies
        run: dotnet restore

      - name: Install frontend dependencies
        working-directory: src/HouseFlow.Frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: src/HouseFlow.Frontend
        run: npx playwright install --with-deps chromium

      - name: Build .NET projects
        run: dotnet build --no-restore

      - name: Start Aspire App (background)
        run: |
          dotnet run --project src/HouseFlow.AppHost > /tmp/aspire-apphost.log 2>&1 &
          echo $! > aspire.pid

      - name: Wait for Aspire App to be ready
        run: |
          echo "Waiting for API health check (localhost:5203/health)..."
          timeout 120 bash -c 'until curl -sf http://localhost:5203/health > /dev/null 2>&1; do sleep 2; done'
          echo "API is healthy."
          echo "Waiting for Frontend (localhost:3000)..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 2; done'
          echo "Frontend is ready."

      - name: Debug Aspire App (on failure)
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Listening ports ==="
          ss -tlnp
          echo "=== Aspire AppHost logs (last 50 lines) ==="
          tail -50 /tmp/aspire-apphost.log 2>/dev/null || echo "No log file found"
          echo "=== Try curl on common ports ==="
          curl -v http://localhost:5203/health 2>&1 || true
          curl -v http://localhost:5000/health 2>&1 || true

      - name: Run Playwright tests
        working-directory: src/HouseFlow.Frontend
        run: npx playwright test --project=chromium
        env:
          API_URL: http://localhost:5203

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: src/HouseFlow.Frontend/playwright-report/
          retention-days: 30

      - name: Stop Aspire App
        if: always()
        run: |
          if [ -f aspire.pid ]; then
            kill $(cat aspire.pid) || true
          fi

name: Migrate Container Apps State (one-time)

# Run manually ONCE after merging the state split PR.
# Moves Container App resources from main.tfstate into
# deploy-prod.tfstate and deploy-preprod.tfstate.
on:
  workflow_dispatch:

concurrency:
  group: terraform-migration
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  TF_BASE: infrastructure/terraform
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  migrate:
    name: Migrate State
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      # ── Step 1: Init all three configs ──
      - name: Init all configs
        run: |
          terraform -chdir=$TF_BASE/main init -input=false
          terraform -chdir=$TF_BASE/deploy-prod init -input=false
          terraform -chdir=$TF_BASE/deploy-preprod init -input=false

      # ── Step 2: Get resource IDs from main state ──
      - name: Get Container App resource IDs
        id: ids
        run: |
          get_id() {
            terraform -chdir=$TF_BASE/main state show "$1" 2>/dev/null \
              | grep -oP '(?<=id\s{1,40}= ").*(?=")' | head -1
          }

          API_PROD_ID=$(get_id azurerm_container_app.api_prod)
          API_PREPROD_ID=$(get_id azurerm_container_app.api_preprod)
          FRONTEND_PROD_ID=$(get_id azurerm_container_app.frontend_prod)
          FRONTEND_PREPROD_ID=$(get_id azurerm_container_app.frontend_preprod)

          if [ -z "$API_PROD_ID" ] && [ -z "$API_PREPROD_ID" ]; then
            echo "No Container Apps found in main state — already migrated."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "api_prod_id=$API_PROD_ID" >> "$GITHUB_OUTPUT"
          echo "api_preprod_id=$API_PREPROD_ID" >> "$GITHUB_OUTPUT"
          echo "frontend_prod_id=$FRONTEND_PROD_ID" >> "$GITHUB_OUTPUT"
          echo "frontend_preprod_id=$FRONTEND_PREPROD_ID" >> "$GITHUB_OUTPUT"

      # ── Step 3: Import into new states ──
      - name: Import prod Container Apps
        if: steps.ids.outputs.skip != 'true'
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
          TF_VAR_jwt_key: ${{ secrets.JWT_KEY }}
        run: |
          terraform -chdir=$TF_BASE/deploy-prod import \
            azurerm_container_app.api_prod "${{ steps.ids.outputs.api_prod_id }}"
          terraform -chdir=$TF_BASE/deploy-prod import \
            azurerm_container_app.frontend_prod "${{ steps.ids.outputs.frontend_prod_id }}"

      - name: Import preprod Container Apps
        if: steps.ids.outputs.skip != 'true'
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
          TF_VAR_jwt_key: ${{ secrets.JWT_KEY }}
        run: |
          terraform -chdir=$TF_BASE/deploy-preprod import \
            azurerm_container_app.api_preprod "${{ steps.ids.outputs.api_preprod_id }}"
          terraform -chdir=$TF_BASE/deploy-preprod import \
            azurerm_container_app.frontend_preprod "${{ steps.ids.outputs.frontend_preprod_id }}"

      # ── Step 4: Verify new states ──
      - name: Verify deploy plans
        if: steps.ids.outputs.skip != 'true'
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
          TF_VAR_jwt_key: ${{ secrets.JWT_KEY }}
        run: |
          echo "=== deploy-prod/ ==="
          terraform -chdir=$TF_BASE/deploy-prod plan
          echo ""
          echo "=== deploy-preprod/ ==="
          terraform -chdir=$TF_BASE/deploy-preprod plan

      # ── Step 5: Remove from main state ──
      - name: Remove from main state
        if: steps.ids.outputs.skip != 'true'
        run: |
          cd $TF_BASE/main
          terraform state rm azurerm_container_app.api_prod
          terraform state rm azurerm_container_app.api_preprod
          terraform state rm azurerm_container_app.frontend_prod
          terraform state rm azurerm_container_app.frontend_preprod
          terraform state rm azurerm_management_lock.api_prod || true
          terraform state rm azurerm_management_lock.frontend_prod || true

      # ── Step 6: Verify main state ──
      - name: Verify main plan
        if: steps.ids.outputs.skip != 'true'
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_entra_admin_object_id: ${{ secrets.ENTRA_ADMIN_OBJECT_ID }}
          TF_VAR_entra_admin_name: ${{ secrets.ENTRA_ADMIN_NAME }}
          TF_VAR_bastion_ssh_public_key: ${{ secrets.BASTION_SSH_PUBLIC_KEY }}
        run: terraform -chdir=$TF_BASE/main plan

      - name: Summary
        if: steps.ids.outputs.skip != 'true'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'MD'
          ## State migration complete

          - Container Apps imported into `deploy-prod.tfstate` and `deploy-preprod.tfstate`
          - Container Apps and locks removed from `main.tfstate`

          **Next steps:**
          1. Review the plan outputs above — they should show no unexpected changes
          2. Delete this workflow file once migration is confirmed
          MD

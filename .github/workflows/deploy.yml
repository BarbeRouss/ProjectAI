name: Deploy

on:
  push:
    branches: [main, master, 'claude/**']
  workflow_dispatch: # Manual trigger — build & deploy from any branch

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── Job 1: Build & Push ──────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need tags for CalVer counter

      - name: Set image names
        id: images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "api=ghcr.io/${OWNER}/houseflow-api" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${OWNER}/houseflow-frontend" >> "$GITHUB_OUTPUT"

      - name: Generate CalVer tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          BASE_TAG=$(date +%Y.%m.%d)

          # Add branch suffix for non-main branches
          if [ "$REF_NAME" != "main" ]; then
            BRANCH_SLUG=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9]/-/g' | cut -c1-20)
            BASE_TAG="${BASE_TAG}-${BRANCH_SLUG}"
          fi

          # Check if tag already exists, append counter if so
          COUNTER=1
          TAG=$BASE_TAG
          while git tag -l "$TAG" | grep -q .; do
            COUNTER=$((COUNTER + 1))
            TAG="${BASE_TAG}-${COUNTER}"
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: docker build -t api:latest -f src/HouseFlow.API/Dockerfile .

      - name: Build Frontend image
        run: docker build --progress=plain -t frontend:latest src/HouseFlow.Frontend

      - name: Tag & push images
        env:
          VERSION: ${{ steps.version.outputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          API_IMAGE: ${{ steps.images.outputs.api }}
          WEB_IMAGE: ${{ steps.images.outputs.web }}
        run: |
          docker tag api:latest "$API_IMAGE:$VERSION"
          docker push "$API_IMAGE:$VERSION"

          docker tag frontend:latest "$WEB_IMAGE:$VERSION"
          docker push "$WEB_IMAGE:$VERSION"

          # Only tag as :latest on main/master branch
          if [ "$REF_NAME" = "main" ] || [ "$REF_NAME" = "master" ]; then
            docker tag api:latest "$API_IMAGE:latest"
            docker push "$API_IMAGE:latest"
            docker tag frontend:latest "$WEB_IMAGE:latest"
            docker push "$WEB_IMAGE:latest"
          fi

      - name: Create git tag
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

  # ── Job 2: Deploy Preprod (auto) ─────────────────
  deploy-preprod:
    name: Deploy Preprod
    needs: build
    runs-on: ubuntu-latest
    environment: preprod
    timeout-minutes: 10

    steps:
      - name: Deploy preprod via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: VERSION,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            echo "Deploying preprod version: $VERSION"

            cd /opt/houseflow/preprod

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Update image tag and pull
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$VERSION/" .env
            docker compose pull

            # Restart services
            docker compose up -d

            # Health check (wait for API to be ready)
            echo "Waiting for API health check..."
            sleep 10
            curl -f http://localhost:8180/alive || (docker compose logs api --tail 30 && exit 1)

            echo "Preprod deployed: $VERSION"
        env:
          VERSION: ${{ needs.build.outputs.version }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}

  # ── Job 3: Deploy Prod (manual approval, main only) ──
  deploy-prod:
    name: Deploy Production
    needs: [build, deploy-preprod]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Deploy prod via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: VERSION,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            echo "Deploying production version: $VERSION"

            cd /opt/houseflow/prod

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Update image tag and pull
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$VERSION/" .env
            docker compose pull

            # Restart services
            docker compose up -d

            # Health check (wait for API to be ready)
            echo "Waiting for API health check..."
            sleep 10
            curl -f http://localhost:8080/alive || (docker compose logs api --tail 30 && exit 1)

            # Cleanup old images (keep last 72h)
            docker image prune -f --filter "until=72h"

            echo "Production deployed: $VERSION"
        env:
          VERSION: ${{ needs.build.outputs.version }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}

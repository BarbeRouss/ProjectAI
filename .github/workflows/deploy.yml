name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  TF_DIR: infrastructure/terraform

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  # ── Job 1: Build & Push ──────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set image names
        id: images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "api=ghcr.io/${OWNER}/houseflow-api" >> "$GITHUB_OUTPUT"
          echo "web=ghcr.io/${OWNER}/houseflow-frontend" >> "$GITHUB_OUTPUT"

      - name: Generate CalVer tag
        id: version
        run: |
          BASE_TAG=$(date +%Y.%m.%d)
          COUNTER=1
          TAG=$BASE_TAG
          while git tag -l "$TAG" | grep -q .; do
            COUNTER=$((COUNTER + 1))
            TAG="${BASE_TAG}-${COUNTER}"
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: docker build -t api:latest -f src/HouseFlow.API/Dockerfile .

      - name: Build Frontend image
        run: docker build --progress=plain -t frontend:latest src/HouseFlow.Frontend

      - name: Tag & push images
        env:
          VERSION: ${{ steps.version.outputs.tag }}
          API_IMAGE: ${{ steps.images.outputs.api }}
          WEB_IMAGE: ${{ steps.images.outputs.web }}
        run: |
          docker tag api:latest "$API_IMAGE:$VERSION"
          docker push "$API_IMAGE:$VERSION"
          docker tag api:latest "$API_IMAGE:latest"
          docker push "$API_IMAGE:latest"

          docker tag frontend:latest "$WEB_IMAGE:$VERSION"
          docker push "$WEB_IMAGE:$VERSION"
          docker tag frontend:latest "$WEB_IMAGE:latest"
          docker push "$WEB_IMAGE:latest"

      - name: Create git tag
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

  # ── Job 2: Deploy Preprod ────────────────────────
  deploy-preprod:
    name: Deploy Preprod
    needs: build
    runs-on: ubuntu-latest
    environment: preprod
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: terraform init

      - name: Remove old RG lock (one-time migration)
        run: az lock delete --name no-delete --resource-group rg-houseflow || true

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
          TF_VAR_jwt_key: ${{ secrets.JWT_KEY }}
          TF_VAR_entra_admin_object_id: ${{ secrets.ENTRA_ADMIN_OBJECT_ID }}
          TF_VAR_entra_admin_name: ${{ secrets.ENTRA_ADMIN_NAME }}
          TF_VAR_bastion_ssh_public_key: ${{ secrets.BASTION_SSH_PUBLIC_KEY }}
          TF_VAR_api_image_tag: ${{ needs.build.outputs.version }}
          TF_VAR_frontend_image_tag: ${{ needs.build.outputs.version }}
        run: terraform apply -auto-approve

      - name: Health Check
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          API_URL=$(terraform output -raw api_preprod_url)
          echo "Checking API health at $API_URL/alive..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 30 "$API_URL/alive" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Preprod API is healthy! (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/30 — HTTP $HTTP_CODE — waiting 10s..."
            sleep 10
          done
          echo "::warning::Preprod API health check failed after 5 minutes"
          exit 0  # Non-blocking during VNet migration — TODO: restore exit 1

  # ── Job 3: Deploy Prod (manual approval) ─────────
  deploy-prod:
    name: Deploy Production
    needs: [build, deploy-preprod]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
          TF_VAR_jwt_key: ${{ secrets.JWT_KEY }}
          TF_VAR_entra_admin_object_id: ${{ secrets.ENTRA_ADMIN_OBJECT_ID }}
          TF_VAR_entra_admin_name: ${{ secrets.ENTRA_ADMIN_NAME }}
          TF_VAR_bastion_ssh_public_key: ${{ secrets.BASTION_SSH_PUBLIC_KEY }}
          TF_VAR_api_image_tag: ${{ needs.build.outputs.version }}
          TF_VAR_frontend_image_tag: ${{ needs.build.outputs.version }}
        run: terraform apply -auto-approve

      - name: Health Check
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          API_URL=$(terraform output -raw api_prod_url)
          echo "Checking API health at $API_URL/alive..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 30 "$API_URL/alive" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Production API is healthy! (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i/30 — HTTP $HTTP_CODE — waiting 10s..."
            sleep 10
          done
          echo "::error::Production API health check failed after 5 minutes"
          exit 1

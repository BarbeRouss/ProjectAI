name: Deploy

on:
  push:
    branches: [main, master, 'claude/**']
  workflow_dispatch: # Manual trigger — build & deploy from any branch

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/houseflow-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/houseflow-frontend

jobs:
  # ── Job 1: Build & Push ──────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need tags for CalVer counter

      - name: Generate CalVer tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          BASE_TAG=$(date +%Y.%m.%d)

          # Add branch suffix for non-main branches
          if [ "$REF_NAME" != "main" ]; then
            BRANCH_SLUG=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9]/-/g' | cut -c1-20)
            BASE_TAG="${BASE_TAG}-${BRANCH_SLUG}"
          fi

          # Check if tag already exists, append counter if so
          COUNTER=1
          TAG=$BASE_TAG
          while git tag -l "$TAG" | grep -q .; do
            COUNTER=$((COUNTER + 1))
            TAG="${BASE_TAG}-${COUNTER}"
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: docker build -t api:latest -f src/HouseFlow.API/Dockerfile .

      - name: Build Frontend image
        run: |
          docker build --progress=plain -t frontend:latest src/HouseFlow.Frontend 2>&1 | tee /tmp/frontend-build.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        run: |
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -100 /tmp/frontend-build.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No build log found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Tag & push images
        env:
          VERSION: ${{ steps.version.outputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          docker tag api:latest "$API_IMAGE:$VERSION"
          docker push "$API_IMAGE:$VERSION"

          docker tag frontend:latest "$WEB_IMAGE:$VERSION"
          docker push "$WEB_IMAGE:$VERSION"

          # Only tag as :latest on main/master branch
          if [ "$REF_NAME" = "main" ] || [ "$REF_NAME" = "master" ]; then
            docker tag api:latest "$API_IMAGE:latest"
            docker push "$API_IMAGE:latest"
            docker tag frontend:latest "$WEB_IMAGE:latest"
            docker push "$WEB_IMAGE:latest"
          fi

      - name: Create git tag
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

  # ── Job 2: Deploy Preprod (auto) ─────────────────
  deploy-preprod:
    name: Deploy Preprod
    needs: build
    runs-on: ubuntu-latest
    environment: preprod
    timeout-minutes: 10

    steps:
      - name: Deploy preprod via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: VERSION
          script: |
            set -e

            # 1. Sync prod DB to preprod
            /opt/houseflow/scripts/sync-db-to-preprod.sh

            # 2. Pull new images
            cd /opt/houseflow/preprod
            export IMAGE_TAG="$VERSION"
            docker compose pull

            # 3. Restart preprod
            docker compose up -d

            # 4. Health check
            sleep 5
            curl -f http://localhost:8180/alive || exit 1

            echo "Preprod deployed: $VERSION"
        env:
          VERSION: ${{ needs.build.outputs.version }}

  # ── Job 3: Deploy Prod (manual approval, main only) ──
  deploy-prod:
    name: Deploy Production
    needs: [build, deploy-preprod]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Deploy prod via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: VERSION
          script: |
            set -e

            # 1. Pull new images
            cd /opt/houseflow/prod
            export IMAGE_TAG="$VERSION"
            docker compose pull

            # 2. Restart prod
            docker compose up -d

            # 3. Health check
            sleep 5
            curl -f http://localhost:8080/alive || exit 1

            # 4. Cleanup old images (keep last 72h)
            docker image prune -f --filter "until=72h"

            echo "Production deployed: $VERSION"
        env:
          VERSION: ${{ needs.build.outputs.version }}

name: Migrate Terraform State (one-time)

# Run manually once after merging the state split PR.
# Splits houseflow.tfstate → main.tfstate + ephemeral.tfstate
on:
  workflow_dispatch:

concurrency:
  # Block both deploy and preview workflows during migration
  group: terraform-apply
  cancel-in-progress: false

env:
  TF_DIR: infrastructure/terraform
  STORAGE_ACCOUNT: sthouseflowtfstate
  CONTAINER: tfstate
  OLD_KEY: houseflow.tfstate
  MAIN_KEY: main.tfstate
  EPHEMERAL_KEY: ephemeral.tfstate

permissions:
  id-token: write
  contents: read

jobs:
  migrate:
    name: Split State
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      # ── Step 1: Copy old state blob → main.tfstate ──
      - name: Copy state blob
        run: |
          echo "Checking if main.tfstate already exists..."
          EXISTS=$(az storage blob exists \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$CONTAINER" \
            --name "$MAIN_KEY" \
            --auth-mode login \
            --query exists -o tsv)

          if [ "$EXISTS" = "true" ]; then
            echo "main.tfstate already exists — skipping copy."
          else
            echo "Copying $OLD_KEY → $MAIN_KEY..."
            az storage blob copy start \
              --account-name "$STORAGE_ACCOUNT" \
              --destination-container "$CONTAINER" \
              --destination-blob "$MAIN_KEY" \
              --source-container "$CONTAINER" \
              --source-blob "$OLD_KEY" \
              --auth-mode login
            echo "Copy complete."
          fi

      # ── Step 2: Init main/ with the new state ──
      - name: Init main/
        working-directory: ${{ env.TF_DIR }}/main
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: terraform init -input=false

      # ── Step 3: Find PR resources in main state ──
      - name: Find PR resources to migrate
        id: find-pr
        working-directory: ${{ env.TF_DIR }}/main
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          PR_RESOURCES=$(terraform state list 2>/dev/null | grep -E '(module\.pr_env|azurerm_postgresql_flexible_server_database\.pr)' || true)
          if [ -z "$PR_RESOURCES" ]; then
            echo "No PR resources found in main state."
            echo "has_pr_resources=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found PR resources:"
            echo "$PR_RESOURCES"
            echo "has_pr_resources=true" >> "$GITHUB_OUTPUT"
            # Save to file for the next step
            echo "$PR_RESOURCES" > /tmp/pr_resources.txt
          fi

      # ── Step 4: Init ephemeral/ ──
      - name: Init ephemeral/
        working-directory: ${{ env.TF_DIR }}/ephemeral
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: terraform init -input=false

      # ── Step 5: Move PR resources main → ephemeral ──
      - name: Move PR resources to ephemeral state
        if: steps.find-pr.outputs.has_pr_resources == 'true'
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          # Pull both states locally for terraform state mv
          cd main && terraform state pull > /tmp/main.tfstate && cd ..
          cd ephemeral && terraform state pull > /tmp/ephemeral.tfstate && cd ..

          while IFS= read -r resource; do
            echo "Moving: $resource"
            terraform state mv \
              -state=/tmp/main.tfstate \
              -state-out=/tmp/ephemeral.tfstate \
              "$resource" "$resource" || echo "  ⚠ Skipped: $resource"
          done < /tmp/pr_resources.txt

          # Push updated states back to remote
          cd main && terraform state push /tmp/main.tfstate && cd ..
          cd ephemeral && terraform state push /tmp/ephemeral.tfstate && cd ..
          echo "State migration complete."

      # ── Step 6: Verify both states ──
      - name: Verify main/ state
        working-directory: ${{ env.TF_DIR }}/main
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
          TF_VAR_jwt_key: ${{ secrets.JWT_KEY }}
          TF_VAR_entra_admin_object_id: ${{ secrets.ENTRA_ADMIN_OBJECT_ID }}
          TF_VAR_entra_admin_name: ${{ secrets.ENTRA_ADMIN_NAME }}
          TF_VAR_bastion_ssh_public_key: ${{ secrets.BASTION_SSH_PUBLIC_KEY }}
        run: |
          echo "=== main/ terraform plan ==="
          terraform plan -detailed-exitcode -out=/dev/null 2>&1 | tail -5 || true

      - name: Verify ephemeral/ state
        working-directory: ${{ env.TF_DIR }}/ephemeral
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_ghcr_pat: ${{ secrets.GHCR_PAT }}
          TF_VAR_jwt_key: ${{ secrets.JWT_KEY }}
        run: |
          echo "=== ephemeral/ terraform plan ==="
          terraform plan -detailed-exitcode -out=/dev/null 2>&1 | tail -5 || true

      - name: Summary
        run: |
          echo "## ✅ State migration complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`houseflow.tfstate\` → copied to \`main.tfstate\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR resources moved to \`ephemeral.tfstate\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next steps:**" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Verify both plans show no unexpected changes" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Delete the old \`houseflow.tfstate\` blob when confident" >> "$GITHUB_STEP_SUMMARY"

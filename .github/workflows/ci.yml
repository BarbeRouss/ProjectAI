name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ============================================================================
  # Backend: Unit + Integration Tests
  # ============================================================================
  backend-tests:
    name: Backend Tests (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test tests/HouseFlow.UnitTests/HouseFlow.UnitTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=unit-tests.trx"

      - name: Run Integration Tests
        run: dotnet test tests/HouseFlow.IntegrationTests/HouseFlow.IntegrationTests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=integration-tests.trx"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            tests/HouseFlow.UnitTests/TestResults/
            tests/HouseFlow.IntegrationTests/TestResults/
          retention-days: 7

  # ============================================================================
  # Frontend: Lint + Type Check
  # ============================================================================
  frontend-checks:
    name: Frontend Checks (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HouseFlow.Frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/HouseFlow.Frontend
        run: npm ci

      - name: Lint
        working-directory: src/HouseFlow.Frontend
        run: npx eslint . --max-warnings 0

      - name: Build
        working-directory: src/HouseFlow.Frontend
        run: npm run build

  # ============================================================================
  # E2E Tests (requires full stack)
  # ============================================================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [backend-tests, frontend-checks]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: houseflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/HouseFlow.Frontend/package-lock.json

      - name: Install .NET dependencies
        run: dotnet restore

      - name: Install frontend dependencies
        working-directory: src/HouseFlow.Frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: src/HouseFlow.Frontend
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Build .NET projects
        run: dotnet build --no-restore

      - name: Start Aspire App (background)
        run: |
          dotnet run --project src/HouseFlow.AppHost &
          echo $! > aspire.pid
          sleep 30

      - name: Run Playwright tests
        working-directory: src/HouseFlow.Frontend
        run: npm test
        env:
          API_URL: http://localhost:5203

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: src/HouseFlow.Frontend/playwright-report/
          retention-days: 30

      - name: Stop Aspire App
        if: always()
        run: |
          if [ -f aspire.pid ]; then
            kill $(cat aspire.pid) || true
          fi

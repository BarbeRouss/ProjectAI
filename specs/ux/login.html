<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - House Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    },
                    boxShadow: {
                        'soft': '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04)',
                        'soft-lg': '0 25px 50px -12px rgba(0, 0, 0, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }
        @keyframes float-delayed {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(-2deg); }
        }
        .animate-float { animation: float 8s ease-in-out infinite; }
        .animate-float-delayed { animation: float-delayed 7s ease-in-out infinite; animation-delay: 1s; }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50/50 to-purple-50/30 min-h-screen font-sans">

    <!--
    ==========================================
    ÉCRAN: Login
    ROUTE: /[locale]/login
    STYLE: Soft & Rounded - Consumer Moderne
    ==========================================
    -->

    <!-- Decorative background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-gradient-to-br from-blue-200 to-purple-200 rounded-full blur-3xl opacity-40 animate-float"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-gradient-to-br from-orange-200 to-pink-200 rounded-full blur-3xl opacity-30 animate-float-delayed"></div>
    </div>

    <div class="relative min-h-screen flex">
        <!-- Left side - Illustration (hidden on mobile) -->
        <div class="hidden lg:flex lg:w-1/2 items-center justify-center p-12">
            <div class="max-w-lg">
                <!-- Illustration SVG -->
                <div class="relative">
                    <!-- House illustration -->
                    <svg viewBox="0 0 400 300" class="w-full animate-float" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Background shapes -->
                        <circle cx="320" cy="80" r="40" fill="#dbeafe" class="animate-pulse"/>
                        <circle cx="60" cy="200" r="25" fill="#fce7f3"/>

                        <!-- House -->
                        <path d="M200 50L100 130H300L200 50Z" fill="url(#roof-gradient)"/>
                        <rect x="120" y="130" width="160" height="120" rx="8" fill="white" stroke="#e2e8f0" stroke-width="2"/>

                        <!-- Door -->
                        <rect x="175" y="180" width="50" height="70" rx="4" fill="url(#door-gradient)"/>
                        <circle cx="215" cy="215" r="4" fill="#fbbf24"/>

                        <!-- Windows -->
                        <rect x="135" y="150" width="35" height="35" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
                        <rect x="230" y="150" width="35" height="35" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
                        <line x1="152.5" y1="150" x2="152.5" y2="185" stroke="#3b82f6" stroke-width="2"/>
                        <line x1="135" y1="167.5" x2="170" y2="167.5" stroke="#3b82f6" stroke-width="2"/>
                        <line x1="247.5" y1="150" x2="247.5" y2="185" stroke="#3b82f6" stroke-width="2"/>
                        <line x1="230" y1="167.5" x2="265" y2="167.5" stroke="#3b82f6" stroke-width="2"/>

                        <!-- Chimney -->
                        <rect x="240" y="70" width="30" height="50" rx="4" fill="#f97316"/>

                        <!-- Garden elements -->
                        <ellipse cx="90" cy="260" rx="30" ry="15" fill="#86efac"/>
                        <ellipse cx="310" cy="255" rx="40" ry="20" fill="#86efac"/>
                        <circle cx="85" cy="240" r="20" fill="#22c55e"/>
                        <circle cx="320" cy="230" r="25" fill="#22c55e"/>

                        <!-- Checkmark badge -->
                        <circle cx="320" cy="100" r="30" fill="url(#check-gradient)"/>
                        <path d="M308 100L315 107L332 90" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

                        <defs>
                            <linearGradient id="roof-gradient" x1="100" y1="50" x2="300" y2="130" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#3b82f6"/>
                                <stop offset="1" stop-color="#8b5cf6"/>
                            </linearGradient>
                            <linearGradient id="door-gradient" x1="175" y1="180" x2="225" y2="250" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#f97316"/>
                                <stop offset="1" stop-color="#ea580c"/>
                            </linearGradient>
                            <linearGradient id="check-gradient" x1="290" y1="70" x2="350" y2="130" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#22c55e"/>
                                <stop offset="1" stop-color="#16a34a"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>

                <div class="text-center mt-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-3">Gardez votre maison en forme</h2>
                    <p class="text-gray-500">Suivez tous vos entretiens au même endroit. Plus jamais d'oubli.</p>
                </div>
            </div>
        </div>

        <!-- Right side - Form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-6">
            <div class="w-full max-w-md">
                <!-- Logo -->
                <div class="text-center mb-8">
                    <div class="inline-flex items-center gap-3 mb-6">
                        <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                            </svg>
                        </div>
                        <span class="text-2xl font-bold gradient-text">House Flow</span>
                    </div>
                    <p class="text-gray-500">Ravi de vous revoir !</p>
                </div>

                <!-- Card -->
                <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-soft-lg p-8 border border-white/50">
                    <h1 class="text-2xl font-bold text-gray-900 mb-6">Connexion</h1>

                    <!-- Form -->
                    <form class="space-y-5">
                        <!-- Email -->
                        <div>
                            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">
                                Email
                            </label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                required
                                placeholder="vous@exemple.com"
                                class="w-full px-4 py-3.5 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition placeholder:text-gray-400"
                            >
                        </div>

                        <!-- Password -->
                        <div>
                            <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                                Mot de passe
                            </label>
                            <div class="relative">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    required
                                    placeholder="••••••••"
                                    class="w-full px-4 py-3.5 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition placeholder:text-gray-400 pr-12"
                                >
                                <button
                                    type="button"
                                    onclick="togglePassword()"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition"
                                >
                                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Error message (hidden by default) -->
                        <div id="error-message" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-2xl text-sm flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            Email ou mot de passe incorrect
                        </div>

                        <!-- Submit button -->
                        <button
                            type="submit"
                            class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-semibold py-4 px-4 rounded-2xl shadow-lg shadow-blue-500/30 hover:shadow-blue-500/40 transition-all duration-300 hover:scale-[1.02] flex items-center justify-center gap-2"
                        >
                            Se connecter
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="flex items-center gap-4 my-6">
                        <div class="flex-1 h-px bg-gray-200"></div>
                        <span class="text-sm text-gray-400">ou</span>
                        <div class="flex-1 h-px bg-gray-200"></div>
                    </div>

                    <!-- Register link -->
                    <p class="text-center text-gray-600">
                        Pas encore de compte ?
                        <a href="register.html" class="text-blue-600 hover:text-blue-700 font-semibold ml-1 hover:underline">
                            Créer un compte
                        </a>
                    </p>
                </div>

                <!-- Back to index -->
                <p class="mt-6 text-center">
                    <a href="index.html" class="text-gray-400 text-sm hover:text-gray-600 transition">← Retour aux maquettes</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - House Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        'primary-hover': '#1d4ed8',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <!--
    ==========================================
    ÉCRAN: Register
    ROUTE: /[locale]/register
    ==========================================

    COMPOSANTS:
    - Logo centré
    - Card formulaire
    - Input prénom (required)
    - Input nom (required)
    - Input email (type=email, required)
    - Input password (type=password, required, min 8 chars)
    - Input confirm password (must match)
    - Button submit
    - Link vers login

    ÉTATS:
    - Default: formulaire vide
    - Loading: bouton avec spinner
    - Error: message rouge
    - Success: redirect vers dashboard

    VALIDATION:
    - Prénom: required
    - Nom: required
    - Email: required, format email, unique
    - Password: required, min 8 chars
    - Confirm: must match password
    ==========================================
    -->

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">House Flow</h1>
            <p class="text-gray-500 mt-2">Créez votre compte gratuitement</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-2xl font-semibold text-gray-900 mb-6">Inscription</h2>

            <!-- Form -->
            <form class="space-y-5">
                <!-- Name row -->
                <div class="grid grid-cols-2 gap-4">
                    <!-- First name -->
                    <div>
                        <label for="firstName" class="block text-sm font-medium text-gray-700 mb-1">
                            Prénom
                        </label>
                        <input
                            type="text"
                            id="firstName"
                            name="firstName"
                            required
                            placeholder="Jean"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                        >
                    </div>

                    <!-- Last name -->
                    <div>
                        <label for="lastName" class="block text-sm font-medium text-gray-700 mb-1">
                            Nom
                        </label>
                        <input
                            type="text"
                            id="lastName"
                            name="lastName"
                            required
                            placeholder="Dupont"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                        >
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                        Email
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="vous@exemple.com"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        Mot de passe
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        minlength="8"
                        placeholder="Min. 8 caractères"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                    >
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">
                        Confirmer le mot de passe
                    </label>
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        required
                        placeholder="••••••••"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                    >
                </div>

                <!-- Error message (hidden by default) -->
                <div id="error-message" class="hidden bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">
                    Cet email est déjà utilisé
                </div>

                <!-- Submit button -->
                <button
                    type="submit"
                    class="w-full bg-primary hover:bg-primary-hover text-white font-medium py-3 px-4 rounded-lg transition flex items-center justify-center gap-2"
                >
                    <span>Créer mon compte</span>
                </button>
            </form>

            <!-- Login link -->
            <p class="mt-6 text-center text-gray-600">
                Déjà un compte ?
                <a href="login.html" class="text-primary hover:underline font-medium">
                    Se connecter
                </a>
            </p>
        </div>

        <!-- Back to index -->
        <p class="mt-4 text-center">
            <a href="index.html" class="text-gray-400 text-sm hover:underline">← Retour aux maquettes</a>
        </p>
    </div>
</body>
</html>

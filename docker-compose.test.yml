# Full-stack local test environment
# Usage: docker compose -f docker-compose.test.yml up --build
#
# API:      http://localhost:8080
# Frontend: http://localhost:3000

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: houseflow
      POSTGRES_PASSWORD: houseflow
      POSTGRES_DB: houseflow_test
    ports:
      - "5432:5432"
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U houseflow -d houseflow_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/HouseFlow.API/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__houseflow: "Host=db;Port=5432;Database=houseflow_test;Username=houseflow;Password=houseflow"
      JWT__KEY: "ThisIsALocalTestSecretKeyForDevelopment1234567890"
      Jwt__Issuer: "HouseFlow"
      Jwt__Audience: "HouseFlow"
      CORS__ORIGINS: "http://localhost:3000"
      ASPNETCORE_ENVIRONMENT: "Development"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/alive"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: src/HouseFlow.Frontend
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"

volumes:
  test_postgres_data:
